<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente IA - Loja Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 4C13.66 4 15 5.34 15 7C15 8.66 13.66 10 12 10C10.34 10 9 8.66 9 7C9 5.34 10.34 4 12 4ZM16.36 18C15.3 16.14 13.78 15 12 15C10.22 15 8.7 16.14 7.64 18C6.6 16.39 6 14.28 6 12C6 8.69 8.69 6 12 6C15.31 6 18 8.69 18 12C18 14.28 17.4 16.39 16.36 18Z"/>
                </svg>
                <span class="status-indicator"></span>
            </div>
            <div class="header-info">
                <h1>Lumi</h1>
                <p>Assistente Virtual</p>
            </div>
            <button class="options-btn" id="clear-chat" title="Limpar Conversa">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/>
                </svg>
            </button>
        </header>

        <main class="chat-box" id="chat-box">
            <!-- As mensagens aparecerão aqui -->
        </main>

        <footer class="chat-input-container">
            <input type="text" id="user-input" placeholder="Escreva sua mensagem..." autocomplete="off">
            <button id="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </footer>
    </div>

    <!-- Elemento para a bolinha de digitação -->
    <template id="typing-template">
        <div class="message ai typing-message">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
